- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ['~']

- link:
    ~/.config/kitty:
      path: kitty
    ~/.config/fish:
      path: fish
    ~/.config/starship.toml:
      path: starship.toml
    ~/.tmux.conf:
      path: tmux.conf
    ~/.bin:
      path: bin
    ~/.config/karabiner:
      path: karabiner
    ~/.config/yabai:
      path: yabai
    ~/.config/skhd:
      path: skhd
    ~/.config/limelight:
      path: limelight
    ~/.config/bat:
      path: bat
    ~/.rgrc:
      path: rgrc
    /usr/local/bin/limelight:
      path: external/limelight/bin/limelight

- shell:
  - [git submodule update --init --recursive, Installing submodules]
