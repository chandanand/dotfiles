- defaults:
    link:
      create: true
      force: true
      relink: true

- clean: ['~']

- link:
    ~/.config/kitty:
      path: kitty
    ~/.config/fish:
      path: fish
    ~/.config/starship.toml:
      path: starship.toml
    ~/.tmux.conf:
      path: tmux.conf
    ~/.bin:
      path: bin
    ~/.config/karabiner:
      path: karabiner

- shell:
  - [git submodule update --init --recursive, Installing submodules]
