- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.config/kitty:
      create: true
      force: true
      relink: true
      path: kitty
    ~/.config/fish:
      force: true
      relink: true
      path: fish
    ~/.config/starship.toml:
      force: true
      relink: true
      path: starship.toml
    ~/.tmux.conf:
      force: true
      relink: true
      path: tmux.conf

- shell:
  - [git submodule update --init --recursive, Installing submodules]
